<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1">

<title>Gerenciar Pet</title>

<link rel="stylesheet"
      href="../css/style.css">

<style>

.manage-card {
    background: white;
    border-radius: 24px;
    padding: 24px;
    box-shadow:
        0 10px 30px
        rgba(0,0,0,0.08);
}

.form-group {
    margin-top: 16px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

.form-group input,
.form-group textarea,
.form-group select {

    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #ddd;
}

.primary-btn {
    width: 100%;
    border: none;
    padding: 18px;
    border-radius: 16px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 18px;
}

.missing-btn {
    background: #dc2626;
}

.safe-btn {
    background: #16a34a;
}

.hidden {
    display: none;
}

</style>
</head>

<body>

<div class="container">

<div class="manage-card">

<div id="pet-info">
Carregando...
</div>

<div id="missing-form"
     class="hidden">

    <div class="form-group">

        <label>
            📍 Última região
        </label>

        <input
            id="regiao"
            placeholder=
            "Ex: Cristo Rei">

    </div>

    <div class="form-group">

        <label>
            📝 Observações
        </label>

        <textarea
            id="obs"
            rows="4"
            placeholder=
            "Ex: Muito dócil, pode estar assustado">
        </textarea>

    </div>

    <div class="form-group">

        <label>
            💰 Tem recompensa?
        </label>

        <select id="reward">

            <option value="false">
                Não
            </option>

            <option value="true">
                Sim
            </option>

        </select>

    </div>

    <div class="form-group">

        <label>
            Valor recompensa
        </label>

        <input
            id="reward-value"
            type="number"
            placeholder=
            "100">

    </div>

    <button
        id="save-missing"
        class=
        "primary-btn missing-btn">

        🚨 Salvar desaparecimento

    </button>
    <button
    id="cancel-btn"
    class="primary-btn safe-btn">

    Cancelar

</button>

</div>

<button
    id="missing-btn"
    class=
    "primary-btn missing-btn">

    🚨 Meu pet fugiu

</button>

<button
    id="safe-btn"
    class=
    "primary-btn safe-btn hidden">

    ✅ Meu pet voltou

</button>

<div
id="scan-history"
style="
margin-top:20px;
">

<h3>
👀 Últimos acessos
</h3>

<div id="scan-list">

Carregando...

</div>

</div>

</div>
</div>

<script type="module">

import { createClient }
from "https://esm.sh/@supabase/supabase-js";

import {
SUPABASE_URL,
SUPABASE_ANON_KEY
}
from "../js/config.js";

const client =
createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

let pet = null;

function getToken() {

const params =
new URLSearchParams(
window.location.search
);

return params.get(
"token"
);
}

async function loadPet() {

const token =
getToken();

const {
data
}
=
await client
.from("pets")
.select("*")
.eq(
"manage_token",
token
)
.single();

pet = data;

renderPet();

await loadScans();
}

function renderPet() {

document
.getElementById(
"pet-info"
)
.innerHTML = `
<h2>
🐶 ${pet.nome}
</h2>

<p>
Tutor:
${pet.tutor}
</p>

<p>
Status:
${
pet.status ===
"missing"
?
"🚨 Perdido"
:
"✅ Seguro"
}
</p>
`;

if (
pet.status ===
"missing"
) {

document
.getElementById(
"safe-btn"
)
.classList
.remove(
"hidden"
);

document
.getElementById(
"missing-btn"
)
.classList
.add(
"hidden"
);

document
.getElementById(
"missing-form"
)
.classList
.remove(
"hidden"
);

} else {

document
.getElementById(
"missing-btn"
)
.classList
.remove(
"hidden"
);

document
.getElementById(
"safe-btn"
)
.classList
.add(
"hidden"
);
}
document
.getElementById(
"regiao"
)
.value =
pet
.desaparecido_regiao
?? "";

document
.getElementById(
"obs"
)
.value =
pet
.desaparecido_obs
?? "";

document
.getElementById(
"reward"
)
.value =
String(
pet
.tem_recompensa
);

document
.getElementById(
"reward-value"
)
.value =
pet
.recompensa
?? 0;
}

document
.getElementById(
"missing-btn"
)
.addEventListener(
"click",
() => {

document
.getElementById(
"missing-form"
)
.classList
.remove(
"hidden"
);

document
.getElementById(
"missing-btn"
)
.classList
.add(
"hidden"
);

});

document
.getElementById(
"cancel-btn"
)
.addEventListener(
"click",
() => {

document
.getElementById(
"regiao"
)
.value =
pet
.desaparecido_regiao
?? "";

document
.getElementById(
"obs"
)
.value =
pet
.desaparecido_obs
?? "";

document
.getElementById(
"reward"
)
.value =
String(
pet
.tem_recompensa
);

document
.getElementById(
"reward-value"
)
.value =
pet
.recompensa
?? 0;

if (
pet.status !==
"missing"
) {

document
.getElementById(
"missing-form"
)
.classList
.add(
"hidden"
);

document
.getElementById(
"missing-btn"
)
.classList
.remove(
"hidden"
);

}

});

document
.getElementById(
"save-missing"
)
.addEventListener(
"click",
async () => {

const regiao =
document
.getElementById(
"regiao"
)
.value;

const obs =
document
.getElementById(
"obs"
)
.value;

const temReward =
document
.getElementById(
"reward"
)
.value
=== "true";

const reward =
document
.getElementById(
"reward-value"
)
.value || 0;

await client
.from("pets")
.update({

status:
"missing",

desaparecido_regiao:
regiao,

desaparecido_obs:
obs,

tem_recompensa:
temReward,

recompensa:
reward

})
.eq(
"id",
pet.id
);

alert(
"Pet marcado como perdido"
);

loadPet();
});

document
.getElementById(
"safe-btn"
)
.addEventListener(
"click",
async () => {

await client
.from("pets")
.update({

status:
"safe",

desaparecido_regiao:
null,

desaparecido_obs:
null,

tem_recompensa:
false,

recompensa:
0

})
.eq(
"id",
pet.id
);

document
.getElementById(
"missing-form"
)
.classList
.add(
"hidden"
);

await loadPet();

});

function tempoRelativo(
data
) {

const scan =
new Date(
data + "Z"
);

const agora =
new Date();

const diffMs =
agora -
scan;

const segundos =
Math.floor(
diffMs / 1000
);

if (
segundos < 60
) {

return "Agora";
}

const minutos =
Math.floor(
segundos / 60
);

if (
minutos < 60
) {

return minutos === 1
? "1 min atrás"
: `${minutos} min atrás`;
}

const horas =
Math.floor(
minutos / 60
);

if (
horas < 24
) {

return horas === 1
? "1 hora atrás"
: `${horas} horas atrás`;
}

const dias =
Math.floor(
horas / 24
);

return dias === 1
? "1 dia atrás"
: `${dias} dias atrás`;
}

async function loadScans() {

const div =
document
.getElementById(
"scan-list"
);

if (
!pet ||
!pet.id
) {

div.innerHTML =
"Nenhum acesso";

return;
}

try {

const {
data,
error
}
=
await client
.from("scans")
.select("*")
.eq(
"pet_id",
pet.id
)
.order(
"created_at",
{
ascending:false
}
)
.limit(10);

if (
error
) {

console.error(
error
);

div.innerHTML =
"Erro ao carregar";

return;
}

if (
!data ||
!data.length
) {

div.innerHTML =
"Nenhum acesso";

return;
}

div.innerHTML =
data
.map(
scan => `

<div
style="
background:#f7f8fc;
padding:14px;
border-radius:16px;
margin-top:10px;
">

📍
${
scan.cidade
?? "Não identificado"
}

<br>

🕒
${
tempoRelativo(
scan.created_at
)
}

</div>

`
)
.join("");

} catch(err) {

console.error(
err
);

div.innerHTML =
"Erro ao carregar";
}
}

loadPet();

</script>

</body>
</html>
