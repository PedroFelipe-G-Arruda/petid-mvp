<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
PetID Admin
</title>

<link
rel="stylesheet"
href="../css/style.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6fb;
}

.container{
max-width:1200px;
margin:0 auto;
padding:24px;
}

.admin-card{
background:white;
border-radius:24px;
padding:24px;
box-shadow:
0 10px 30px
rgba(0,0,0,0.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:24px;
flex-wrap:wrap;
}

.primary-btn{
border:none;
padding:14px 18px;
border-radius:16px;
background:#2563eb;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:.2s;
}

.primary-btn:hover{
transform:translateY(-1px);
}

.green-btn{
background:#16a34a;
}

.orange-btn{
background:#ea580c;
}

.gray-btn{
background:#64748b;
}

.pet-card{
background:white;
border-radius:24px;
padding:20px;
margin-top:18px;
box-shadow:
0 6px 20px
rgba(0,0,0,0.06);
border:1px solid #eee;
}

.pet-header{
display:flex;
gap:16px;
align-items:center;
}

.pet-photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
background:#ddd;
}

.pet-status{
margin-top:6px;
font-weight:bold;
}

.safe{
color:#16a34a;
}

.missing{
color:#dc2626;
}

.pet-actions{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:18px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal-content{
background:white;
border-radius:24px;
padding:24px;
max-width:420px;
width:100%;
text-align:center;
position:relative;
}

.close-modal{
position:absolute;
right:16px;
top:16px;
cursor:pointer;
font-size:24px;
font-weight:bold;
}

.qr-wrapper{
display:flex;
justify-content:center;
margin:20px 0;
}

#qr-canvas{
background:white;
padding:16px;
border-radius:20px;
}

.empty-state{
text-align:center;
padding:50px;
color:#666;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:white;
padding:14px 20px;
border-radius:14px;
display:none;
z-index:9999;
font-weight:bold;
}

@media(max-width:700px){

.pet-header{
flex-direction:column;
text-align:center;
}

}

</style>
</head>

<body>

<div class="container">

<div class="admin-card">

<div class="header">

<h2>
🐶 Pets cadastrados
</h2>

<a
href="./new-pet.html?key=pedro-pet-2026"
class="primary-btn">

+ Novo Pet

</a>

</div>

<div
style="
margin-bottom:20px;
">

<input
id="search-input"
placeholder="🔍 Buscar pet..."

style="
width:100%;
padding:16px;
border-radius:16px;
border:1px solid #ddd;
font-size:16px;
">

</div>


</div>

<div
id="stats-grid"

style="
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin-bottom:24px;
">

<div
class="stat-card">

<div class="stat-title">
🐶 Total Pets
</div>

<div
id="total-pets"
class="stat-number">

0

</div>

</div>

<div
class="stat-card">

<div class="stat-title">
🚨 Perdidos
</div>

<div
id="missing-pets"
class="stat-number">

0

</div>

</div>

<div
class="stat-card">

<div class="stat-title">
👀 Scans Hoje
</div>

<div
id="today-scans"
class="stat-number">

0

</div>

</div>

</div>

<div id="pet-list">
Carregando pets...
</div>

</div>

</div>

<div
id="qr-modal"
class="modal">

<div class="modal-content">

<span
class="close-modal"
onclick="closeQR()">

×

</span>

<h2>
QR Code do Pet
</h2>

<div class="qr-wrapper">

<canvas
id="qr-canvas">
</canvas>

</div>

<button
class="primary-btn"
onclick="downloadQR()">

⬇️ Baixar PNG

</button>

</div>

</div>

<div
id="toast"
class="toast">
Copiado
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script type="module">

import { createClient }
from
"https://esm.sh/@supabase/supabase-js";

import {
SUPABASE_URL,
SUPABASE_ANON_KEY
}
from
"../js/config.js";

const client =
createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

const ADMIN_KEY =
"pedro-pet-2026";

function checkAdmin(){

const params =
new URLSearchParams(
window.location.search
);

const key =
params.get("key");

if(
key !== ADMIN_KEY
){

document.body.innerHTML =
"<h1>Acesso negado</h1>";

return false;
}

return true;
}

function showToast(text){

const toast =
document.getElementById(
"toast"
);

toast.innerText =
text;

toast.style.display =
"block";

setTimeout(() => {

toast.style.display =
"none";

},2000);

}

async function copyText(text){

try{

await navigator
.clipboard
.writeText(text);

showToast(
"✅ Copiado"
);

}catch{

showToast(
"Erro ao copiar"
);

}

}

window.openQR =
function(url){

const modal =
document.getElementById(
"qr-modal"
);

modal.style.display =
"flex";

QRCode.toCanvas(
document.getElementById(
"qr-canvas"
),
url,
{
width:280,
margin:3
}
);

};

window.closeQR =
function(){

document
.getElementById(
"qr-modal"
)
.style.display =
"none";

};

window.downloadQR =
function(){

const canvas =
document.getElementById(
"qr-canvas"
);

const link =
document.createElement(
"a"
);

link.download =
"pet-qrcode.png";

link.href =
canvas.toDataURL(
"image/png"
);

link.click();

};

let allPets = [];


async function loadStats(){

try{

const {
data: pets,
error: petsError
}
=
await client
.from("pets")
.select(
"status"
);

if(
petsError
)
throw petsError;

const totalPets =
pets?.length ?? 0;

const missingPets =
pets?.filter(
p =>
p.status ===
"missing"
)
.length ?? 0;

document
.getElementById(
"total-pets"
)
.innerText =
totalPets;

document
.getElementById(
"missing-pets"
)
.innerText =
missingPets;

const today =
new Date();

today.setHours(
0,0,0,0
);

const {
data: scans,
error: scansError
}
=
await client
.from("scans")
.select(
"created_at"
)
.gte(
"created_at",
today.toISOString()
);

if(
scansError
){

console.error(
scansError
);

document
.getElementById(
"today-scans"
)
.innerText =
"0";

return;
}

document
.getElementById(
"today-scans"
)
.innerText =
scans?.length ?? 0;

}catch(err){

console.error(
"Erro stats:",
err
);

}
}


async function loadPets(){

const div =
document.getElementById(
"pet-list"
);

try{

const {
data,
error
}
=
await client
.from("pets")
.select("*")
.order(
"created_at",
{
ascending:false
}
);

if(error)
throw error;

allPets =
data;

if(
!data ||
!data.length
){

div.innerHTML =
`
<div class="empty-state">

<h3>
Nenhum pet cadastrado
</h3>

</div>
`;

return;
}

renderPets(
allPets
);

}catch(err){

console.error(
err
);

div.innerHTML =
"Erro ao carregar pets";

}
}

function renderPets(
pets
){

const div =
document.getElementById(
"pet-list"
);

if(
!pets.length
){

div.innerHTML =
`
<div class="empty-state">

<h3>
Nenhum pet encontrado
</h3>

</div>
`;

return;
}

div.innerHTML =
pets.map(
pet => {

const petUrl =
`${window.location.origin}/pages/pet.html?id=${pet.public_id}`;

const manageUrl =
`${window.location.origin}/pages/manage.html?token=${pet.manage_token}`;

const editUrl =
`${window.location.origin}/pages/new-pet.html?key=${ADMIN_KEY}&id=${pet.public_id}`;

return `

<div class="pet-card">

<div class="pet-header">

<img
class="pet-photo"
src="${
pet.foto_url ||
'https://placehold.co/200'
}">

<div>

<h2>
${pet.nome ?? "Sem nome"}
</h2>

<div
class="
pet-status
${
pet.status ===
"missing"
?
"missing"
:
"safe"
}
">

${
pet.status ===
"missing"
?
"🚨 Perdido"
:
"✅ Seguro"
}

</div>

<p>
Tutor:
<b>
${pet.tutor ?? "-"}
</b>
</p>

</div>

</div>

<div class="pet-actions">

<a
href="${petUrl}"
target="_blank"
class="primary-btn">

🐶 Abrir Pet

</a>

<a
href="${manageUrl}"
target="_blank"
class="
primary-btn
green-btn">

⚙️ Gerenciar

</a>

<a
href="${editUrl}"
class="
primary-btn
orange-btn">

✏️ Editar

</a>

<button
class="
primary-btn
gray-btn"

onclick="
copyPetLink(
'${pet.public_id}'
)
">

📋 Link Pet

</button>

<button
class="
primary-btn
gray-btn"

onclick="
copyTutorLink(
'${pet.manage_token}'
)
">

👤 Link Tutor

</button>

<button
class="
primary-btn
gray-btn"

onclick="
openPetQR(
'${pet.public_id}'
)
">

▣ QR Code

</button>

</div>

</div>

`;

}
)
.join("");

}

window.copyPetLink =
function(
publicId
){

const url =
`${window.location.origin}/pages/pet.html?id=${publicId}`;

copyText(url);

};

window.copyTutorLink =
function(
token
){

const url =
`${window.location.origin}/pages/manage.html?token=${token}`;

copyText(url);

};

window.openPetQR =
function(
publicId
){

const url =
`${window.location.origin}/pages/pet.html?id=${publicId}`;

openQR(url);

};

document
.getElementById(
"search-input"
)
.addEventListener(
"input",
event => {

const term =
event.target.value
.toLowerCase()
.trim();

const filtered =
allPets.filter(
pet =>

(
pet.nome ?? ""
)
.toLowerCase()
.includes(term)

||

(
pet.tutor ?? ""
)
.toLowerCase()
.includes(term)

);

renderPets(
filtered
);

});

if(
checkAdmin()
){

loadStats();

loadPets();

}

</script>

</body>
</html>
