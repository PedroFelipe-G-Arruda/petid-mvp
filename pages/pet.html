<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>PetID</title>

    <link rel="stylesheet"
          href="../css/style.css">
</head>

<body>

<div class="container">

    <div id="pet-info">
        Carregando pet...
    </div>

</div>

<script type="module">

import { createClient }
from "https://esm.sh/@supabase/supabase-js";

import {
    SUPABASE_URL,
    SUPABASE_ANON_KEY
} from "../js/config.js";

const client = createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

function getPetId() {
    const params =
        new URLSearchParams(
            window.location.search
        );

    return params.get("id");
}

function calcularIdade(
nascimento
) {

if (!nascimento) {

return
"Idade não informada";
}

const hoje =
new Date();

const nasc =
new Date(
nascimento
);

const diffMs =
hoje - nasc;

const dias =
Math.floor(
diffMs /
(
1000 * 60 *
60 * 24
)
);

if (
dias < 30
) {

if (
dias <= 1
) {

return
"1 dia";
}

return `${dias}
dias`;
}

const meses =
Math.floor(
dias / 30
);

if (
meses < 12
) {

if (
meses === 1
) {

return
"1 mês";
}

return `${meses}
meses`;
}

const anos =
Math.floor(
meses / 12
);

if (
anos === 1
) {

return
"1 ano";
}

return `${anos}
anos`;
}


async function loadPet() {

    const publicId =
        getPetId();

    const petDiv =
        document.getElementById(
            "pet-info"
        );

    const {
        data,
        error
    } = await client
        .from("pets")
        .select("*")
        .eq(
            "public_id",
            publicId
        )
        .single();

    await registrarScan(
data.id
);

    if (error) {
        petDiv.innerHTML =
            "Pet não encontrado";

        return;
    }

    const statusClass =
        data.status === "missing"
        ? "missing"
        : "safe";

    const statusText =
    data.status === "missing"
    ? `
    <div class="alert-banner">

        <div class="alert-title">
            🚨 PET DESAPARECIDO
        </div>

        <div class="alert-subtitle">
            ${data.nome}
            está perdido.
        </div>

    </div>

    <div class="last-seen">

        <strong>
            📍 Última região vista
        </strong>

        <br><br>

        ${
            data.desaparecido_regiao
            ?? "Não informada"
        }

        <br><br>

        ${
            data.desaparecido_obs
            ?? ""
        }

    </div>

    ${
        data.tem_recompensa
        ? `
        <div class="reward-box">
            💰 RECOMPENSA
            <br><br>
            R$ ${data.recompensa}
        </div>
        `
        : ""
    }
    `
    : `
    ✅ Estou seguro
    <br>
    Se encontrou minha tag,
    fale com meu tutor.
    `;

    petDiv.innerHTML = `
    <div class="card">

        <div class="pet-photo">
            <img src="${
                data.foto_url ??
                'https://placehold.co/300'
            }">
        </div>

        <div class="pet-name">
            ${data.nome}
        </div>

        <div class="pet-meta">
            ${calcularIdade(data.nascimento)} •
            ${data.raca ?? "-"} •
            ${data.sexo ?? "-"}
        </div>

        <div class="status ${statusClass}">
            ${statusText}
        </div>

        <div class="buttons">

            <a class="btn call"
               href="tel:${data.telefone}">
                📞 Ligar
            </a>

            <a class="btn whatsapp"
               href="https://wa.me/${data.whatsapp}"
               target="_blank">

                💬 WhatsApp
            </a>

            ${
                data.telegram
                ? `
                <a class="btn telegram"
                   href="https://t.me/${data.telegram.replace('@','')}"
                   target="_blank">

                    ✈️ Telegram
                </a>
                `
                : ""
            }

        </div>

        <div class="section">

            <h3>
                👤 Tutor
            </h3>

            <div class="info-card">
                ${data.tutor}
            </div>

        </div>

        <div class="section">

            <h3>
                🩺 Saúde
            </h3>

            <div class="info-card">
                <strong>
                Medicamentos:
                </strong>
                <br>
                ${data.remedios ?? "-"}
            </div>

            <div class="info-card">
                <strong>
                Alergias:
                </strong>
                <br>
                ${data.alergias ?? "-"}
            </div>

            <div class="info-card">
                <strong>
                Cuidados:
                </strong>
                <br>
                ${
                    data.condicoes_especiais
                    ?? "-"
                }
            </div>

        </div>

    </div>
    `;
}

async function registrarScan(
petId
) {

try {

const userAgent =
navigator.userAgent;

const ultimaLeitura =
localStorage
.getItem(
`scan_${petId}`
);

const agora =
Date.now();

if (
ultimaLeitura &&
(
agora -
parseInt(
ultimaLeitura
)
)
<
5 * 60 * 1000
) {

return;
}

let cidade =
"Desconhecida";

try {

const res =
await fetch(
"https://ipapi.co/json/"
);

const geo =
await res.json();

cidade =
geo.city
?? "Desconhecida";

} catch {}

await client
.from("scans")
.insert({

pet_id:
petId,

cidade:
cidade,

user_agent:
userAgent

});

localStorage
.setItem(
`scan_${petId}`,
agora
);

} catch(err) {

console.error(
"Erro scan:",
err
);

}
}

loadPet();

</script>

</body>
</html>
